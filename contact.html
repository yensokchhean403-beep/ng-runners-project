<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - NextGen Runners Club</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Extra styling for contact form input boxes */
        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #D4AF37;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #1F2937;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-family: 'Poppins', sans-serif;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: 1px solid #D4AF37;
        }
    </style>
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="Logo 03.png" alt="Logo">
                <h2>NextGen Runners Club</h2>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="merchandise.html">Merchandise</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero" style="height: 60vh;">
            <div class="hero-content">
                <h1>Contact Us</h1>
                <p>Have questions? Want to join? Send us a message and we'll get right back to you.</p>
            </div>
        </section>

        <section class="activities">
            <div class="contact-form">
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Your Email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="5" placeholder="How can we help you?" required></textarea>
                    </div>
                    <button type="submit" class="btn" style="border: none; cursor: pointer; width: 100%;">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <h3>NextGen Runners Club</h3>
        <p>Mindfulness & Running</p>
        <p>© 2026 All Rights Reserved</p>
    </footer>

</body>
</html>
